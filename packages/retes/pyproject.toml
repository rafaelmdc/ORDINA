[project]
name = "ordina-retes"
version = "0.0.0"
description = "ORDINA Retes — the science: layer factories, multiplex, analysis, recovery. No Django."
requires-python = ">=3.12"
dependencies = [
    "ordina-core",
    "typer>=0.12",
    "braidworks-core",
    "gtdb-weaver",
    "numpy>=1.26",
    "scipy>=1.13",
]

[project.scripts]
ordina = "ordina_retes.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ordina_retes"]

[tool.uv.sources]
ordina-core = { workspace = true }
# Braidworks is its own repo on GitHub, consumed here as a git dependency pinned to
# immutable release tags: `fetch` + the gtdb tree-placement capability feed the phylogeny
# layer. Bump the tags to adopt newer Braidworks releases.
braidworks-core = { git = "https://github.com/rafaelmdc/braidworks.git", subdirectory = "braidworks-core", tag = "braidworks-core-v0.11.1" }
gtdb-weaver = { git = "https://github.com/rafaelmdc/braidworks.git", subdirectory = "weavers/gtdb_weaver", tag = "gtdb_weaver-v0.2.0" }
