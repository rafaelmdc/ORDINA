[project]
name = "ordina-retes"
version = "0.0.0"
description = "ORDINA Retes — the science: layer factories, multiplex, analysis, recovery. No Django."
requires-python = ">=3.12"
dependencies = [
    "ordina-core",
    "typer>=0.12",
]

[project.scripts]
ordina = "ordina_retes.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ordina_retes"]

[tool.uv.sources]
ordina-core = { workspace = true }
