[project]
name = "ordina-retes"
version = "0.0.0"
description = "ORDINA Retes — the science: layer factories, multiplex, analysis, recovery. No Django."
requires-python = ">=3.12"
dependencies = [
    "ordina-core",
    "typer>=0.12",
    "braidworks-core",
    "gtdb-weaver",
    "numpy>=1.26",
    "scipy>=1.13",
]

[project.scripts]
ordina = "ordina_retes.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ordina_retes"]

[tool.uv.sources]
ordina-core = { workspace = true }
# Braidworks is its own repo on GitHub; consumed here as a git dependency (the lockfile
# pins the exact commit). `fetch` + the gtdb tree-placement capability feed the phylogeny
# layer. Repoint to `main` / a release tag once these branches merge upstream.
braidworks-core = { git = "https://github.com/rafaelmdc/braidworks.git", subdirectory = "braidworks-core", branch = "feat/gtdb-tree-placement" }
gtdb-weaver = { git = "https://github.com/rafaelmdc/braidworks.git", subdirectory = "weavers/gtdb_weaver", branch = "feat/gtdb-tree-placement" }
