[project]
name = "ordina-core"
version = "0.0.0"
description = "ORDINA domain types — framework-free (no Django, no web imports)"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ordina_core"]
